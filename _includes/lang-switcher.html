<div class="lang-switcher">
  {% assign posts = site.posts | where: "ref", page.ref %}
  {% for post in posts %}
    <a href="{{ post.url }}" 
       class="{% if post.lang == page.lang %}active{% endif %}">
      {{ post.lang | upcase }}
    </a>
    {% unless forloop.last %}<span>|</span>{% endunless %}
  {% endfor %}
</div>
